services:
  # adwebapp:
  #   container_name: adwebapp
  #   build:
  #     context: ./
  #   restart: unless-stopped
  #   ports:
  #     - ${PORT}:3000
  #   networks:
  #     - adwebapp-network

  postgres:
    image: postgres:15-alpine
    container_name: adwebapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: adwebapp
    ports:
      - "5432:5432"
    networks:
      - adwebapp-network
    volumes:
      - postgres-data:/var/lib/postgresql/data


networks:
  adwebapp-network:
    driver: bridge

volumes:
  postgres-data:
